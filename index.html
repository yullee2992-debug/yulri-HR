<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HR 휴직 관리 도우미</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;600&display=swap');

  :root {
    --navy: #0f2342;
    --navy2: #1a3a5c;
    --blue: #1e5fa8;
    --accent: #00c2ff;
    --accent2: #ff6b35;
    --bg: #f0f4f8;
    --card: #ffffff;
    --text: #1a2332;
    --muted: #6b7c93;
    --border: #d1dce8;
    --green: #10b981;
    --yellow: #f59e0b;
    --red: #ef4444;
    --shadow: 0 4px 24px rgba(15,35,66,0.10);
    --shadow-lg: 0 12px 48px rgba(15,35,66,0.18);
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── HEADER ──────────────────────────────── */
  header {
    background: linear-gradient(135deg, var(--navy) 0%, var(--navy2) 60%, #1a4a7a 100%);
    padding: 0;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 20px rgba(0,0,0,0.3);
  }
  .header-inner {
    max-width: 1100px;
    margin: 0 auto;
    padding: 18px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .header-icon {
    width: 44px; height: 44px;
    background: linear-gradient(135deg, var(--accent), var(--blue));
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
  }
  header h1 {
    color: #fff;
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.3px;
  }
  header p {
    color: rgba(255,255,255,0.55);
    font-size: 12px;
    font-weight: 300;
    margin-top: 2px;
  }
  .header-badge {
    background: rgba(0,194,255,0.15);
    border: 1px solid rgba(0,194,255,0.3);
    color: var(--accent);
    font-size: 11px;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 20px;
    letter-spacing: 0.5px;
  }
  .header-right {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .export-btn {
    padding: 6px 14px;
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 8px;
    color: #fff;
    font-family: inherit;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: background 0.18s;
  }
  .export-btn:hover { background: rgba(255,255,255,0.22); }

  /* ── PDF 인쇄 스타일 ──────────────────────── */
  #printArea { display: none; }
  @media print {
    body > *:not(#printArea) { display: none !important; }
    #printArea {
      display: block !important;
      padding: 20px;
      font-family: 'Noto Sans KR', sans-serif;
      color: #1a2332;
    }
    .print-title { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
    .print-meta { font-size: 11px; color: #6b7c93; margin-bottom: 16px; }
    .print-table { width: 100%; border-collapse: collapse; font-size: 11px; }
    .print-table th {
      background: #0f2342;
      color: white;
      padding: 7px 10px;
      text-align: left;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.3px;
      white-space: nowrap;
    }
    .print-table td {
      padding: 7px 10px;
      border-bottom: 1px solid #d1dce8;
      vertical-align: middle;
      font-size: 11px;
    }
    .print-table tbody tr:nth-child(even) td { background: #f7fafd; }
    .print-badge {
      display: inline-block;
      font-size: 9px;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 20px;
    }
    .pb-active  { background: #d1fae5; color: #065f46; }
    .pb-return  { background: #dbeafe; color: #1e40af; }
    .pb-pending { background: #fef3c7; color: #92400e; }
    .pb-end     { background: #f1f5f9; color: #64748b; }
    .print-section-title {
      font-size: 12px;
      font-weight: 700;
      background: #e8f0fe;
      padding: 5px 10px;
      margin-top: 12px;
      margin-bottom: 0;
      border-left: 3px solid #1e5fa8;
    }
  }

  /* ── MAIN LAYOUT ─────────────────────────── */
  .container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 28px 20px 60px;
  }

  .layout {
    display: grid;
    grid-template-columns: 300px 1fr;
    gap: 20px;
    align-items: start;
  }

  /* ── SIDEBAR ─────────────────────────────── */
  .sidebar {
    position: sticky;
    top: 92px;
  }

  .sidebar-card {
    background: var(--card);
    border-radius: 16px;
    box-shadow: var(--shadow);
    overflow: hidden;
  }

  .sidebar-header {
    background: linear-gradient(135deg, var(--navy), var(--blue));
    padding: 16px 18px;
    color: white;
  }
  .sidebar-header h2 {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.5px;
    opacity: 0.85;
    text-transform: uppercase;
  }

  .leave-list {
    padding: 8px;
    max-height: calc(100vh - 220px);
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }
  .leave-list::-webkit-scrollbar { width: 4px; }
  .leave-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .leave-btn {
    width: 100%;
    text-align: left;
    padding: 11px 14px;
    border: none;
    background: transparent;
    border-radius: 10px;
    cursor: pointer;
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 10px;
    transition: all 0.18s ease;
    line-height: 1.35;
    margin-bottom: 2px;
  }
  .leave-btn:hover {
    background: rgba(30,95,168,0.07);
    color: var(--blue);
  }
  .leave-btn.active {
    background: linear-gradient(135deg, rgba(30,95,168,0.12), rgba(0,194,255,0.08));
    color: var(--blue);
    font-weight: 700;
    border-left: 3px solid var(--blue);
    padding-left: 11px;
  }
  .leave-btn .icon {
    font-size: 16px;
    flex-shrink: 0;
    width: 22px;
    text-align: center;
  }
  .leave-btn .tag {
    margin-left: auto;
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 10px;
    font-weight: 600;
    flex-shrink: 0;
  }
  .tag-paid { background: #d1fae5; color: #065f46; }
  .tag-unpaid { background: #fee2e2; color: #991b1b; }
  .tag-mixed { background: #fef3c7; color: #92400e; }
  .tag-special { background: #ede9fe; color: #5b21b6; }

  /* ── CONTENT ─────────────────────────────── */
  .content {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  /* ── INFO CARD ───────────────────────────── */
  .info-card {
    background: var(--card);
    border-radius: 16px;
    box-shadow: var(--shadow);
    overflow: hidden;
    animation: fadeUp 0.3s ease;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .info-header {
    background: linear-gradient(135deg, var(--navy) 0%, var(--blue) 100%);
    padding: 20px 24px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .info-header .big-icon {
    font-size: 32px;
  }
  .info-header h2 {
    color: white;
    font-size: 18px;
    font-weight: 700;
    line-height: 1.3;
  }
  .info-header .meta {
    display: flex;
    gap: 8px;
    margin-top: 6px;
    flex-wrap: wrap;
  }
  .meta-badge {
    font-size: 11px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.25);
    color: rgba(255,255,255,0.9);
  }
  .meta-badge.paid { background: rgba(16,185,129,0.3); border-color: rgba(16,185,129,0.5); }
  .meta-badge.unpaid { background: rgba(239,68,68,0.3); border-color: rgba(239,68,68,0.5); }
  .meta-badge.mixed { background: rgba(245,158,11,0.3); border-color: rgba(245,158,11,0.5); }

  .info-body {
    padding: 20px 24px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }

  .field {
    background: #f7fafd;
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    transition: box-shadow 0.2s;
  }
  .field:hover { box-shadow: 0 2px 12px rgba(30,95,168,0.08); }
  .field.full { grid-column: 1 / -1; }
  .field-label {
    font-size: 11px;
    font-weight: 700;
    color: var(--blue);
    text-transform: uppercase;
    letter-spacing: 0.7px;
    margin-bottom: 7px;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .field-label::before {
    content: '';
    display: inline-block;
    width: 3px; height: 12px;
    background: var(--accent);
    border-radius: 2px;
  }
  .field-value {
    font-size: 13.5px;
    font-weight: 400;
    color: var(--text);
    line-height: 1.65;
    white-space: pre-line;
  }
  .field-value strong { color: var(--blue); }

  /* Notes field */
  .field.notes-field {
    background: #fffbf0;
    border-color: #fcd34d;
  }
  .field.notes-field .field-label { color: #92400e; }
  .field.notes-field .field-label::before { background: var(--yellow); }
  .field.notes-field .field-value { font-size: 13px; color: #78350f; }

  /* Procedure field */
  .field.proc-field {
    background: #f0f9ff;
    border-color: #bae6fd;
  }
  .field.proc-field .field-label { color: #0c4a6e; }
  .field.proc-field .field-label::before { background: var(--accent); }

  .proc-steps {
    counter-reset: step;
  }
  .proc-step {
    display: flex;
    gap: 10px;
    padding: 7px 0;
    border-bottom: 1px solid rgba(186,230,253,0.5);
    font-size: 13px;
    line-height: 1.5;
    color: var(--text);
  }
  .proc-step:last-child { border-bottom: none; }
  .proc-step .step-num {
    flex-shrink: 0;
    width: 22px; height: 22px;
    background: var(--blue);
    color: white;
    border-radius: 50%;
    font-size: 11px;
    font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    margin-top: 1px;
  }
  .proc-step .step-num.sub { background: var(--muted); font-size: 10px; }

  /* ── STATUS CARD ─────────────────────────── */
  .status-card {
    background: var(--card);
    border-radius: 16px;
    box-shadow: var(--shadow);
    overflow: hidden;
  }
  .status-header {
    background: linear-gradient(135deg, #064e3b, #065f46);
    padding: 18px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
  }
  .status-header h3 { color: white; font-size: 15px; font-weight: 700; }
  .status-header p { color: rgba(255,255,255,0.6); font-size: 12px; margin-top: 2px; }
  .status-body { padding: 20px 24px; overflow-x: auto; }

  /* 요약 배지 */
  .summary-pills {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .s-pill {
    font-size: 12px;
    font-weight: 600;
    padding: 4px 14px;
    border-radius: 20px;
  }
  .s-pill.active  { background: #d1fae5; color: #065f46; }
  .s-pill.return  { background: #dbeafe; color: #1e40af; }
  .s-pill.pending { background: #fef3c7; color: #92400e; }
  .s-pill.end     { background: #f1f5f9; color: #64748b; }

  /* 직원 테이블 */
  .emp-table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 860px; }
  .emp-table thead tr {
    background: linear-gradient(135deg, var(--navy), var(--blue));
    color: white;
  }
  .emp-table th {
    padding: 10px 12px;
    text-align: left;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    white-space: nowrap;
  }
  .emp-table td {
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
    color: var(--text);
    line-height: 1.4;
    white-space: nowrap;
  }
  .emp-table td.name-col { min-width: 70px; font-weight: 700; }
  .emp-table td.note-col { white-space: normal; min-width: 120px; max-width: 200px; }
  .emp-table tbody tr:last-child td { border-bottom: none; }
  .emp-table tbody tr:hover td { background: #f7fafd; }
  .emp-table tbody tr:nth-child(even) td { background: #fafbfd; }
  .emp-table tbody tr:nth-child(even):hover td { background: #f0f4f8; }

  .status-badge {
    display: inline-block;
    font-size: 11px;
    font-weight: 700;
    padding: 3px 9px;
    border-radius: 20px;
    white-space: nowrap;
  }
  .sb-active  { background: #d1fae5; color: #065f46; }
  .sb-return  { background: #dbeafe; color: #1e40af; }
  .sb-pending { background: #fef3c7; color: #92400e; }
  .sb-end     { background: #f1f5f9; color: #64748b; }

  .no-emp {
    text-align: center;
    padding: 30px;
    color: var(--muted);
    font-size: 13px;
  }



  /* ── RESPONSIVE ──────────────────────────── */
  @media (max-width: 768px) {
    .layout { grid-template-columns: 1fr; }
    .sidebar { position: static; }
    .leave-list { max-height: 200px; }
    .info-body { grid-template-columns: 1fr; }
    .field.full { grid-column: 1; }
    .checklist-header { flex-direction: column; align-items: flex-start; }
    .checklist-controls { width: 100%; }
    .worker-input { flex: 1; }
  }

  /* ── EMPTY STATE ─────────────────────────── */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }
  .empty-state .es-icon { font-size: 48px; margin-bottom: 12px; }
  .empty-state h3 { font-size: 16px; font-weight: 600; margin-bottom: 6px; color: var(--text); }
  .empty-state p { font-size: 13px; }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="header-icon">📋</div>
    <div>
      <h1>HR 휴직 관리 도우미</h1>
      <p>휴직/휴가 조회 & 처리 체크리스트 생성 / Creator: CFAO M 조율리</p>
    </div>
    <div class="header-right">
      <button class="export-btn" onclick="exportPDF()">🖨 휴직중 인원 Export</button>
      <div class="header-badge">11가지 유형</div>
    </div>
  </div>
</header>

<div class="container">
  <div class="layout">

    <!-- ── SIDEBAR ── -->
    <div class="sidebar">
      <div class="sidebar-card">
        <div class="sidebar-header">
          <h2>휴직 · 휴가 종류</h2>
        </div>
        <div class="leave-list" id="leaveList"></div>
      </div>
    </div>

    <!-- ── CONTENT ── -->
    <div class="content">
      <!-- Info Card -->
      <div class="info-card" id="infoCard">
        <div class="empty-state">
          <div class="es-icon">👈</div>
          <h3>휴직 종류를 선택하세요</h3>
          <p>왼쪽 목록에서 조회하고 싶은 휴직/휴가 종류를 클릭하면<br>상세 정보가 바로 표시됩니다.</p>
        </div>
      </div>

      <!-- Status Card -->
      <div class="status-card" id="statusCard" style="display:none">
        <div class="status-header">
          <div>
            <h3 id="statusTitle">직원 현황</h3>
            <p id="statusSubtitle"></p>
          </div>
        </div>
        <div class="status-body">
          <div class="summary-pills" id="summaryPills"></div>
          <div id="empTableWrap"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- PDF 인쇄 영역 -->
<div id="printArea"></div>

<script>
// ── DATA ─────────────────────────────────────────────────────────────────────
const leaves = [
  {
    id: 1,
    icon: '🤰',
    name: '임산부 단축근로 + 주간고정',
    salary: '유급', salaryType: 'paid',
    approval: '전무님\n(주간고정만 신청 시 부서장)',
    condition: '임신 12주 이내(초기) or 32주 이후(후기) 임신한 근로자\n임산부 보호 통지서 작성 필요 (EHS, HR)',

    steps: [
      { num:'사전', text:'면담 전 확인: 계약직유무 / 증빙 / 사용이력 / 재직기간' },
      { num:'1', text:'작업자 면담 (사전 증빙 지참)\n  - 기간 확인, 앞/뒤 2hr 결정, EHS 면담 필요 여부' },
      { num:'2', text:'EHS 임산부 보호 동의서 작성 요청 (단축 시작일 = 제출일자)' },

      { num:'4', text:'이메일 승인: 부서장 (첨부X)' },
      { num:'5', text:'이메일 승인: 전무님 (첨부X)' },
      { num:'6', text:'HR: 모든 증빙 제출 (임신확인서, EHS 보호통지서)' },
      { num:'7', text:'현장 알람' },
      { num:'8', text:'작업자 알람: 기간 및 출근방식 안내' },
    ],
  },
  {
    id: 2, icon: '🤱', name: '출산전후휴가 (산전/산후)',
    salary: '유급', salaryType: 'paid',
    approval: '전무님',
    condition: '출산을 앞둔 직원\n(출산예정일 기준 45일 전에 보통 사용)',
    deadline: '신청일자 기준 30일 전',
    duration: '출산 예정일로부터 전후 90일 (미숙아 100일 / 다태아 120일)\n* 출산 후 45일 이상 보장 필수\n* 출산일이 반드시 휴가기간에 포함되어야 함',
    documents: '건강보험 임신·출산 진료비 지급 신청서\n(미숙아 출산: 인큐베이터 등 추가 증빙 필요)',
    notes: '※ 육아휴직 연결 시: 가족관계증명서(주민번호 끝까지) WD 등록 필요\n※ 반드시 전부 소진해야 함\n※ 고위험 산모는 질병코드 확인 필수 (산 전/후 휴가 분리 사용 가능)',
    steps: [

// ── INIT ──────────────────────────────────────────────────────────────────────
function init() {
  const list = document.getElementById('leaveList');
  leaves.forEach((l) => {
    const tagMap = { paid:'유급', unpaid:'무급', mixed:'조건부', special:'보호조치' };
    const tagClass = { paid:'tag-paid', unpaid:'tag-unpaid', mixed:'tag-mixed', special:'tag-special' };
    const cnt = employees.filter(e => e.leaveId === l.id && e.status !== 'end').length;
    const btn = document.createElement('button');
    btn.className = 'leave-btn';
    btn.innerHTML = `
      <span class="icon">${l.icon}</span>
      <span>${l.name}</span>
      ${cnt > 0 ? `<span class="tag tag-paid" style="background:#d1fae5;color:#065f46">${cnt}명</span>` : `<span class="tag ${tagClass[l.salaryType]}">${tagMap[l.salaryType]}</span>`}
    `;
    btn.onclick = () => selectLeave(l, btn);
    list.appendChild(btn);
  });
}

// ── SELECT LEAVE ──────────────────────────────────────────────────────────────
function selectLeave(leave, btnEl) {
  currentLeave = leave;
  document.querySelectorAll('.leave-btn').forEach(b => b.classList.remove('active'));
  btnEl.classList.add('active');
  renderInfo(leave);
  renderStatus(leave);
}

          <span class="meta-badge ${salaryBadge[l.salaryType]}">${salaryLabel[l.salaryType]}</span>
          <span class="meta-badge">결재: ${l.approval.split('\n')[0]}</span>
        </div>
      </div>
    </div>
    <div class="info-body">
      <div class="field">
        <div class="field-label">결재권 상한</div>
        <div class="field-value">${l.approval}</div>
      </div>
      <div class="field">
        <div class="field-label">급여 유형</div>
        <div class="field-value">${l.salary}</div>
      </div>
      <div class="field">
        <div class="field-label">신청 가능 조건</div>
        <div class="field-value">${l.condition}</div>
      </div>
      <div class="field">
        <div class="field-label">신청 기한</div>
        <div class="field-value">${l.deadline}</div>
      </div>
      <div class="field">
        <div class="field-label">사용 가능 기간</div>
        <div class="field-value">${l.duration}</div>
      </div>
      <div class="field">
        <div class="field-label">필요 서류</div>
        <div class="field-value">${l.documents}</div>
      </div>
      <div class="field notes-field full">
        <div class="field-label">⚠ 유의사항</div>
        <div class="field-value">${l.notes}</div>
      </div>
      <div class="field proc-field full">
        <div class="field-label">📌 전체 절차</div>
        <div class="proc-steps">${stepsHtml}</div>
      </div>
    </div>
  `;
}

// ── RENDER STATUS ─────────────────────────────────────────────────────────────
function renderStatus(l) {
  const card = document.getElementById('statusCard');

  if (l.noChecklist) { card.style.display = 'none'; return; }
  card.style.display = 'block';

  const emps = employees.filter(e => e.leaveId === l.id);
  const active  = emps.filter(e => e.status === 'active').length;
  const ret     = emps.filter(e => e.status === 'return').length;
  const pending = emps.filter(e => e.status === 'pending').length;
  const ended   = emps.filter(e => e.status === 'end').length;

  document.getElementById('statusTitle').textContent = `${l.icon} ${l.name} — 직원 현황`;
  document.getElementById('statusSubtitle').textContent = `총 ${emps.length}명 등록`;

  // 요약 배지
  const pills = [
    { label: `휴직중 ${active}명`, cls: 'active', show: true },
    { label: `복귀예정 ${ret}명`, cls: 'return', show: ret > 0 },
    { label: `대기중 ${pending}명`, cls: 'pending', show: pending > 0 },
    { label: `종료 ${ended}명`, cls: 'end', show: ended > 0 },
  ];
  document.getElementById('summaryPills').innerHTML =
    pills.filter(p => p.show).map(p => `<span class="s-pill ${p.cls}">${p.label}</span>`).join('');

  // 테이블
  const wrap = document.getElementById('empTableWrap');
  if (emps.length === 0) {
    wrap.innerHTML = `<div class="no-emp">등록된 직원이 없습니다</div>`;
    return;
  }

  const dateLbl = DATE_LABEL[l.id] || '없음';
  const showDateCol = dateLbl !== '없음';

  const statusLabel = { active:'휴직중', return:'복귀예정', pending:'대기중', end:'종료' };
  const statusCls   = { active:'sb-active', return:'sb-return', pending:'sb-pending', end:'sb-end' };

  wrap.innerHTML = `
    <table class="emp-table">
      <thead>
        <tr>
          <th>No</th>
          <th>이름</th>
          <th>입사일</th>
          <th>담당공정</th>
          <th>사유</th>
          <th>기간</th>
          <th>복귀예정일</th>
          ${showDateCol ? `<th>${dateLbl}</th>` : ''}
          <th>비고</th>
        </tr>
      </thead>
      <tbody>
        ${emps.map((e, i) => `
          <tr>
            <td style="color:var(--muted);font-weight:700;font-size:12px">${i + 1}</td>
            <td class="name-col">${e.name}</td>
            <td>${e.joinDate || '-'}</td>
            <td>${e.process || '-'}</td>
            <td>${e.reason || '-'}</td>
            <td>${e.period || '-'}</td>
            <td>${e.returnDate || '-'}</td>
            ${showDateCol ? `<td>${e.keyDate || '-'}</td>` : ''}
            <td class="note-col">${e.note || '-'}</td>
          </tr>
        `).join('')}
      </tbody>
    </table>
  `;
}

// ── EXPORT PDF ────────────────────────────────────────────────────────────────
function exportPDF() {
  const today = new Date();
  const dateStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;

  const statusLabel = { active:'휴직중', return:'복귀예정', pending:'대기중', end:'종료' };
  const statusCls   = { active:'pb-active', return:'pb-return', pending:'pb-pending', end:'pb-end' };

  // 종료 제외한 전체 직원
  const activeEmps = employees.filter(e => e.status !== 'end');

  if (activeEmps.length === 0) {
    alert('등록된 휴직 인원이 없습니다.');
    return;
  }

  // 휴직 종류별로 그룹핑
  const grouped = {};
  activeEmps.forEach(e => {
    const leave = leaves.find(l => l.id === e.leaveId);
    const leaveName = leave ? `${leave.icon} ${leave.name}` : '기타';
    if (!grouped[leaveName]) grouped[leaveName] = [];
    grouped[leaveName].push({ ...e, leaveName });
  });

  let tableRows = '';
  let rowNum = 1;

  Object.entries(grouped).forEach(([leaveName, emps]) => {
    tableRows += `
      <tr>
        <td colspan="9" class="print-section-title">${leaveName} (${emps.length}명)</td>
      </tr>`;
    emps.forEach(e => {
      const leave = leaves.find(l => l.id === e.leaveId);
      const dateLbl = DATE_LABEL[e.leaveId] || '없음';
      const showDate = dateLbl !== '없음';
      tableRows += `
        <tr>
          <td>${rowNum++}</td>
          <td><strong>${e.name}</strong></td>
          <td>${e.joinDate || '-'}</td>
          <td>${e.process || '-'}</td>
          <td>${e.reason || '-'}</td>
          <td>${e.period || '-'}</td>
          <td>${e.returnDate || '-'}</td>
          <td>${showDate ? (e.keyDate || '-') : '-'}</td>
          <td>${e.note || '-'}</td>
          <td><span class="print-badge ${statusCls[e.status] || 'pb-active'}">${statusLabel[e.status] || '휴직중'}</span></td>
        </tr>`;
    });
  });

  document.getElementById('printArea').innerHTML = `
    <div class="print-title">HR 휴직/휴가 인원 현황</div>
    <div class="print-meta">기준일: ${dateStr} &nbsp;|&nbsp; 총 ${activeEmps.length}명 &nbsp;|&nbsp; Creator: CFAO M 조율리</div>
    <table class="print-table">
      <thead>
        <tr>
          <th>No</th>
          <th>이름</th>
          <th>입사일</th>
          <th>담당공정</th>
          <th>사유</th>
          <th>기간</th>
          <th>복귀예정일</th>
          <th>수술일/출산예정일</th>
          <th>비고</th>
          <th>상태</th>
        </tr>
      </thead>
      <tbody>${tableRows}</tbody>
    </table>
  `;

  window.print();
}

// ── START ─────────────────────────────────────────────────────────────────────
init();
</script>
